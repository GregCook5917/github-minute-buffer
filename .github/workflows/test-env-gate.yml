name: Environment Gate POC

on:
  workflow_dispatch:

jobs:
  job_a:
    name: The Intercepted Job
    runs-on: ubuntu-latest
    environment: buffer-env
    steps:
      - run: |
          echo "This job was paused. GitHub billed 0 minutes."
          echo "The Buffer Platform has executed the code externally, approved the gate, and now we exit natively!"

  job_b:
    name: Downstream Dependency
    runs-on: ubuntu-latest
    needs: job_a
    steps:
      - run: |
          echo "Job B successfully triggered natively because Job A completely seamlessly."
