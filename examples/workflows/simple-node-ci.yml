name: Node.js CI (Buffer Routed)

on:
  push:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Heavy CI Job
    runs-on: ubuntu-latest
    # [CRITICAL STEP] 
    # Routing this to our protected environment forces GitHub to pause the clock.
    # The Buffer Platform intercepts this, runs the steps locally on its infrastructure,
    # and then automatically approves the gate when finished!
    environment: buffer-env
    
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
    - run: echo "Installing dependencies..."
    - run: echo "Running heavy frontend testing suite..."
    - run: echo "Tests passed!"
